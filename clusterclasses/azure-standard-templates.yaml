---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureClusterTemplate
metadata:
  name: azure-standard-cluster-template
  namespace: default
spec:
  template:
    spec:
      location: eastus  # Overridden by patch
      resourceGroup: ""  # Will be generated
      subscriptionID: ""  # From template
      vnetName: ""  # Will be generated
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlaneTemplate
metadata:
  name: azure-standard-controlplane-template
  namespace: default
spec:
  template:
    spec:
      kubeadmConfigSpec:
        clusterConfiguration:
          apiServer:
            extraArgs:
              cloud-provider: azure
          controllerManager:
            extraArgs:
              cloud-provider: azure
        initConfiguration:
          nodeRegistration:
            kubeletExtraArgs:
              cloud-provider: azure
        joinConfiguration:
          nodeRegistration:
            kubeletExtraArgs:
              cloud-provider: azure
      machineTemplate:
        infrastructureRef:
          apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
          kind: AzureMachineTemplate
          name: azure-standard-controlplane-machinetemplate
      replicas: 3
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureMachineTemplate
metadata:
  name: azure-standard-controlplane-machinetemplate
  namespace: default
spec:
  template:
    spec:
      vmSize: Standard_D4s_v3  # Overridden by patch
      osDisk:
        diskSizeGB: 128
        managedDisk:
          storageAccountType: Premium_LRS
      identity: SystemAssigned
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureMachineTemplate
metadata:
  name: azure-standard-worker-machinetemplate
  namespace: default
spec:
  template:
    spec:
      vmSize: Standard_D4s_v3  # Overridden by patch
      osDisk:
        diskSizeGB: 128
        managedDisk:
          storageAccountType: Standard_LRS
      identity: SystemAssigned
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: azure-standard-worker-bootstrap-template
  namespace: default
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            cloud-provider: azure
