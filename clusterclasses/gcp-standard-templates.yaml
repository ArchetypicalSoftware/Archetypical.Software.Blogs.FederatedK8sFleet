---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPClusterTemplate
metadata:
  name: gcp-standard-cluster-template
  namespace: default
spec:
  template:
    spec:
      project: ""  # Provided at cluster level
      region: us-central1  # Overridden by patch
      network:
        name: ""  # Will be generated
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlaneTemplate
metadata:
  name: gcp-standard-controlplane-template
  namespace: default
spec:
  template:
    spec:
      kubeadmConfigSpec:
        clusterConfiguration:
          apiServer:
            extraArgs:
              cloud-provider: gce
          controllerManager:
            extraArgs:
              cloud-provider: gce
        initConfiguration:
          nodeRegistration:
            kubeletExtraArgs:
              cloud-provider: gce
        joinConfiguration:
          nodeRegistration:
            kubeletExtraArgs:
              cloud-provider: gce
      machineTemplate:
        infrastructureRef:
          apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
          kind: GCPMachineTemplate
          name: gcp-standard-controlplane-machinetemplate
      replicas: 3
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPMachineTemplate
metadata:
  name: gcp-standard-controlplane-machinetemplate
  namespace: default
spec:
  template:
    spec:
      machineType: n1-standard-4  # Overridden by patch
      image: ubuntu-2004-lts
      rootVolume:
        sizeGb: 100
        type: pd-standard
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPMachineTemplate
metadata:
  name: gcp-standard-worker-machinetemplate
  namespace: default
spec:
  template:
    spec:
      machineType: n1-standard-4  # Overridden by patch
      image: ubuntu-2004-lts
      rootVolume:
        sizeGb: 100
        type: pd-standard
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: gcp-standard-worker-bootstrap-template
  namespace: default
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            cloud-provider: gce
